<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENAI FIN | Controle Pessoal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-grad: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #172554);
            --card-glass: rgba(15,23,42,0.95);
            --glass-border: rgba(56,189,248,0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #0ea5e9;
            --accent-glow: rgba(14,165,233,0.4);
            --obr: #38bdf8; --obr-bg: rgba(56,189,248,0.12);
            --res: #34d399; --res-bg: rgba(52,211,153,0.12);
            --laz: #fb923c; --laz-bg: rgba(251,146,60,0.12);
            --inc: #a3e635; --inc-bg: rgba(163,230,53,0.10);
        }
        [data-theme="light"] {
            --bg-grad: linear-gradient(-45deg,#f0f9ff,#e0f2fe,#bae6fd,#f1f5f9);
            --card-glass: rgba(255,255,255,0.95);
            --glass-border: rgba(148,163,184,0.3);
            --text-main: #0f172a; --text-muted: #64748b;
        }
        @keyframes oceanMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.4} }
        @keyframes spin      { to{transform:rotate(360deg)} }

        *{box-sizing:border-box;margin:0;padding:0;}
        body { font-family:'Inter',sans-serif; color:var(--text-main); min-height:100vh; background:var(--bg-grad); background-size:400% 400%; animation:oceanMove 15s ease infinite; overflow-x:hidden; }
        h1,h2,h3,h4{font-family:'Outfit',sans-serif;}
        .mono{font-family:'Space Grotesk',monospace;}
        ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}

        /* GLASS */
        .glass { background:var(--card-glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:1.2rem; }

        /* TOP BAR */
        .top-bar { position:sticky;top:0;z-index:50; background:var(--card-glass); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border); padding:.75rem 1.25rem; display:flex;align-items:center;justify-content:space-between;gap:12px; }
        .hbtn { width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);color:var(--text-muted);transition:.2s; }
        .hbtn:hover { background:rgba(14,165,233,.2);color:var(--accent); }

        /* MONTH NAV */
        .month-nav { display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border-radius:10px;padding:4px 8px; }
        .month-nav button { background:none;border:none;color:var(--text-muted);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.2s; }
        .month-nav button:hover { background:rgba(14,165,233,.2);color:var(--accent); }
        #monthLabel { font-family:'Outfit',sans-serif;font-weight:800;font-size:.9rem;min-width:110px;text-align:center; }

        /* STATUS DOT */
        .sdot { width:8px;height:8px;border-radius:50%;background:#94a3b8;transition:background .3s; }
        .sdot.online { background:#34d399;box-shadow:0 0 8px #34d399; }
        .sdot.sync   { background:#38bdf8;animation:pulse 1s infinite; }
        .sdot.error  { background:#f87171; }

        /* RECEITA BAR */
        .receita-bar { display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;margin-bottom:14px;border-radius:1rem;border:1px solid rgba(163,230,53,.22);background:rgba(163,230,53,.06); }

        /* POTE CARDS */
        .pote-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px; }
        @media(max-width:560px){.pote-grid{grid-template-columns:1fr;}}
        .pote-card { padding:1rem;border-radius:1rem;border:1px solid; }
        .pote-card.obr { background:var(--obr-bg);border-color:rgba(56,189,248,.25); }
        .pote-card.res { background:var(--res-bg);border-color:rgba(52,211,153,.25); }
        .pote-card.laz { background:var(--laz-bg);border-color:rgba(251,146,60,.25); }
        .pote-icon { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:white;margin-bottom:.6rem; }
        .obr .pote-icon{background:var(--obr);} .res .pote-icon{background:var(--res);} .laz .pote-icon{background:var(--laz);}
        .pote-label { font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted); }
        .pote-val { font-family:'Space Grotesk',monospace;font-weight:800;font-size:1.2rem;margin:4px 0; }
        .obr .pote-val{color:var(--obr);} .res .pote-val{color:var(--res);} .laz .pote-val{color:var(--laz);}
        .pote-meta { font-size:.68rem;color:var(--text-muted);font-weight:600; }
        .pote-bar-bg  { height:5px;background:rgba(128,128,128,.2);border-radius:3px;overflow:hidden;margin-top:10px; }
        .pote-bar-fill { height:100%;border-radius:3px;transition:width .8s ease; }
        .obr .pote-bar-fill{background:var(--obr);} .res .pote-bar-fill{background:var(--res);} .laz .pote-bar-fill{background:var(--laz);}

        /* TX LIST */
        .tx-item { display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;margin-bottom:8px;border:1px solid rgba(128,128,128,.1);background:rgba(255,255,255,.02);transition:.2s;cursor:default; }
        [data-theme="light"] .tx-item{background:white;border-color:#e2e8f0;}
        .tx-item:hover{border-color:var(--accent);background:rgba(255,255,255,.05);}
        .tx-date-box { display:flex;flex-direction:column;align-items:center;justify-content:center;width:40px;height:40px;border-radius:9px;flex-shrink:0;background:rgba(128,128,128,.1);border:1px solid rgba(255,255,255,.05); }
        .tx-day { font-family:'Space Grotesk',monospace;font-weight:800;font-size:1.05rem;line-height:1; }
        .tx-month { font-size:.55rem;text-transform:uppercase;font-weight:800;color:var(--text-muted); }
        .tx-info { flex:1;overflow:hidden; }
        .tx-desc { font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .tx-sub  { font-size:.7rem;color:var(--text-muted);font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px; }
        .pote-badge { font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px; }
        .badge-obr{background:var(--obr-bg);color:var(--obr);} .badge-res{background:var(--res-bg);color:var(--res);}
        .badge-laz{background:var(--laz-bg);color:var(--laz);} .badge-in{background:var(--inc-bg);color:var(--inc);}
        .tx-right { text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px; }
        .tx-val { font-family:'Space Grotesk',monospace;font-weight:800;font-size:.92rem; }
        .tx-val.out{color:#f87171;} .tx-val.in{color:var(--inc);}
        .tx-actions { display:flex;gap:6px;margin-top:2px; }
        .act { width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;transition:.2s;border:none; }
        .act-edit{background:rgba(14,165,233,.15);color:var(--accent);}
        .act-del{background:rgba(239,68,68,.15);color:#f87171;}
        .act-edit:hover{background:var(--accent);color:white;} .act-del:hover{background:#ef4444;color:white;}

        /* PARCELAMENTOS */
        .parcela-card { padding:1rem;border-radius:12px;margin-bottom:10px;border:1px solid var(--glass-border);background:rgba(255,255,255,.02); }
        [data-theme="light"] .parcela-card{background:white;border-color:#e2e8f0;}
        .parcela-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px; }
        .parcela-nome { font-weight:800;font-size:.88rem; }
        .parcela-info { font-size:.7rem;color:var(--text-muted);font-weight:600; }
        .parcela-bar-bg { height:8px;background:rgba(128,128,128,.15);border-radius:4px;overflow:hidden; }
        .parcela-bar-fill { height:100%;border-radius:4px;background:linear-gradient(90deg,#a78bfa,#818cf8);transition:width .8s ease; }
        .parcela-pct { font-size:.65rem;color:var(--text-muted);font-weight:700;margin-top:5px;display:flex;justify-content:space-between; }
        .edit-parcela { background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.7rem;padding:2px 6px;border-radius:4px;transition:.2s; }
        .edit-parcela:hover{color:var(--accent);background:rgba(14,165,233,.1);}

        /* INPUTS */
        .inp { width:100%;padding:.72rem 1rem;border-radius:.75rem;outline:none;border:1px solid var(--glass-border);font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;transition:.3s;background:rgba(255,255,255,.07);color:var(--text-main); }
        [data-theme="light"] .inp{background:white;color:#0f172a;border-color:#e2e8f0;}
        .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
        .inp-val{font-size:1.5rem;font-family:'Space Grotesk',monospace;font-weight:800;text-align:center;}

        /* TIPO TOGGLE */
        .tipo-toggle{display:flex;gap:6px;}
        .tipo-btn{flex:1;padding:.6rem;border-radius:.6rem;border:2px solid transparent;font-weight:800;font-size:.8rem;cursor:pointer;transition:.2s;text-transform:uppercase;letter-spacing:.5px;background:rgba(255,255,255,.05);color:var(--text-muted);}
        .tipo-btn.active-out{background:rgba(248,113,113,.15);color:#f87171;border-color:#f87171;}
        .tipo-btn.active-in{background:var(--inc-bg);color:var(--inc);border-color:var(--inc);}

        /* MODAL */
        .modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:15px;}
        .modal-box{width:100%;max-width:480px;border-radius:20px;padding:24px;max-height:92vh;overflow-y:auto;background:#1e293b;border:1px solid #334155;color:#f8fafc;box-shadow:0 25px 50px rgba(0,0,0,.6);}
        [data-theme="light"] .modal-box{background:#fff;color:#0f172a;border-color:#e2e8f0;}
        .form-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:5px;display:block;}
        .form-group{margin-bottom:13px;}

        /* BUTTONS */
        .btn-primary{width:100%;padding:.85rem;border-radius:.85rem;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:800;font-size:.95rem;background:linear-gradient(135deg,#0ea5e9,#3b82f6);color:white;transition:.3s;box-shadow:0 4px 15px rgba(14,165,233,.35);}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(14,165,233,.5);}
        .btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 4px 15px rgba(239,68,68,.3);}
        .btn-danger:hover{box-shadow:0 6px 20px rgba(239,68,68,.5);}

        /* CLOUD SHIELD */
        #cloud-shield{position:fixed;inset:0;z-index:9999;background:#020617;color:white;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
        .shield-spinner{width:40px;height:40px;border:3px solid rgba(14,165,233,.3);border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite;}

        /* FAB */
        .benai-fab{position:fixed;bottom:24px;right:24px;z-index:90;width:52px;height:52px;border-radius:50%;background:#0ea5e9;color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(14,165,233,.4);transition:transform .2s,box-shadow .2s;font-size:1.1rem;}
        .benai-fab:hover{transform:scale(1.08);} .benai-fab:active{transform:scale(.96);}
        .benai-fab-dot{position:absolute;top:3px;right:3px;width:12px;height:12px;border-radius:50%;background:#94a3b8;border:2px solid white;transition:background .3s;}

        /* TOAST */
        #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;border:1px solid #334155;color:#f8fafc;padding:10px 20px;border-radius:50px;font-weight:700;font-size:.85rem;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;display:flex;align-items:center;gap:8px;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* SECTION TITLE */
        .section-title{font-family:'Outfit',sans-serif;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:flex;align-items:center;gap:10px;margin-bottom:12px;}
        .section-title::after{content:'';flex:1;height:1px;background:var(--glass-border);}

        /* FILTER CHIPS */
        .filter-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
        .fchip{padding:5px 12px;border-radius:20px;font-size:.7rem;font-weight:700;border:1px solid var(--glass-border);cursor:pointer;transition:.2s;background:rgba(255,255,255,.04);color:var(--text-muted);}
        .fchip.active{background:var(--accent);color:white;border-color:var(--accent);}
        [data-theme="light"] .fchip{background:white;}

        /* EMPTY STATE */
        .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
        .empty-state i{font-size:2.5rem;margin-bottom:12px;opacity:.35;}
    </style>
</head>
<body>

    <script src="auth.js"></script>
    <script src="benai-core.js"></script>

    <div id="cloud-shield">
        <div class="shield-spinner"></div>
        <p style="font-family:'Outfit',sans-serif;font-weight:700;opacity:.7;">Sincronizando...</p>
    </div>

    <!-- TOP BAR -->
    <header class="top-bar">
        <div style="display:flex;align-items:center;gap:10px;">
            <a href="index.html" class="hbtn" title="Voltar">
                <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
            </a>
            <div>
                <h1 style="font-size:1rem;font-weight:800;line-height:1;">BENAI <span style="color:var(--accent);">FIN</span></h1>
                <p style="font-size:.58rem;color:var(--text-muted);font-weight:700;letter-spacing:.5px;">CONTROLE PESSOAL</p>
            </div>
        </div>

        <div class="month-nav">
            <button onclick="changeMonth(-1)"><i data-lucide="chevron-left" style="width:14px;height:14px;"></i></button>
            <span id="monthLabel">—</span>
            <button onclick="changeMonth(1)"><i data-lucide="chevron-right" style="width:14px;height:14px;"></i></button>
        </div>

        <div style="display:flex;align-items:center;gap:8px;">
            <div class="sdot" id="statusDot"></div>
            <button onclick="toggleTheme()" class="hbtn">
                <i id="theme-icon" data-lucide="moon" style="width:16px;height:16px;"></i>
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main style="max-width:680px;margin:0 auto;padding:18px 15px 120px;">

        <!-- RECEITA -->
        <div class="receita-bar glass">
            <div>
                <p style="font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);">Receita do Mês</p>
                <p id="receitaTotal" class="mono" style="font-size:1.45rem;font-weight:800;color:var(--inc);">R$ 0,00</p>
            </div>
            <div style="text-align:right;">
                <p style="font-size:.62rem;font-weight:800;color:var(--text-muted);">Saldo Disponível</p>
                <p id="saldoLivre" class="mono" style="font-size:1.1rem;font-weight:800;color:var(--accent);">R$ 0,00</p>
            </div>
        </div>

        <!-- POTES -->
        <div class="pote-grid">
            <div class="pote-card obr glass">
                <div class="pote-icon"><i class="fa-solid fa-house-chimney"></i></div>
                <p class="pote-label">Obrigações</p>
                <p class="pote-val" id="obrVal">R$ 0,00</p>
                <p class="pote-meta" id="obrMeta">— % da receita</p>
                <div class="pote-bar-bg"><div class="pote-bar-fill" id="obrBar" style="width:0%"></div></div>
            </div>
            <div class="pote-card res glass">
                <div class="pote-icon"><i class="fa-solid fa-piggy-bank"></i></div>
                <p class="pote-label">Reserva</p>
                <p class="pote-val" id="resVal">R$ 0,00</p>
                <p class="pote-meta" id="resMeta">meta: R$ 0,00</p>
                <div class="pote-bar-bg"><div class="pote-bar-fill" id="resBar" style="width:0%"></div></div>
            </div>
            <div class="pote-card laz glass">
                <div class="pote-icon"><i class="fa-solid fa-star"></i></div>
                <p class="pote-label">Lazer</p>
                <p class="pote-val" id="lazVal">R$ 0,00</p>
                <p class="pote-meta" id="lazMeta">teto: R$ 0,00</p>
                <div class="pote-bar-bg"><div class="pote-bar-fill" id="lazBar" style="width:0%"></div></div>
            </div>
        </div>

        <!-- NOVO LANÇAMENTO -->
        <button onclick="openTxModal()" style="width:100%;padding:.95rem;border-radius:1rem;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:800;font-size:.95rem;background:linear-gradient(135deg,#0ea5e9,#3b82f6);color:white;box-shadow:0 4px 15px rgba(14,165,233,.35);transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
            <i data-lucide="plus-circle" style="width:18px;height:18px;"></i> NOVO LANÇAMENTO
        </button>

        <!-- LANÇAMENTOS -->
        <div>
            <div class="section-title">Lançamentos do Mês</div>
            <div class="filter-row">
                <button class="fchip active" onclick="setFilter('all')"        id="fAll">Todos</button>
                <button class="fchip"        onclick="setFilter('in')"         id="fIn">Entradas</button>
                <button class="fchip"        onclick="setFilter('out')"        id="fOut">Saídas</button>
                <button class="fchip"        onclick="setFilter('obrigacao')"  id="fObr">Obrigações</button>
                <button class="fchip"        onclick="setFilter('reserva')"    id="fRes">Reserva</button>
                <button class="fchip"        onclick="setFilter('lazer')"      id="fLaz">Lazer</button>
            </div>
            <div id="txList"></div>
        </div>

        <!-- PARCELAMENTOS -->
        <div style="margin-top:30px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                <span class="section-title" style="flex:1;margin-bottom:0;">Parcelamentos</span>
                <button onclick="openParcelaModal(null)" style="background:none;border:none;color:var(--accent);font-size:.72rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:4px;margin-left:8px;">
                    <i data-lucide="plus" style="width:12px;height:12px;"></i> ADICIONAR
                </button>
            </div>
            <div id="parcelaList"></div>
        </div>

    </main>

    <!-- MODAL: TRANSAÇÃO -->
    <div id="modal-tx" class="modal-overlay">
        <div class="modal-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
                <h2 id="txModalTitle" style="font-size:1.1rem;font-weight:800;">Novo Lançamento</h2>
                <button onclick="closeModal('modal-tx')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;">✕</button>
            </div>
            <input type="hidden" id="txId">

            <div class="form-group">
                <label class="form-label">Valor</label>
                <input type="text" id="txVal" class="inp inp-val" placeholder="R$ 0,00" oninput="maskMoney(this)" autocomplete="off">
            </div>
            <div class="form-group">
                <label class="form-label">Data</label>
                <input type="date" id="txDate" class="inp">
            </div>
            <div class="form-group">
                <label class="form-label">Tipo</label>
                <div class="tipo-toggle">
                    <button class="tipo-btn active-out" id="btnOut" onclick="setTipo('out')">⬇ Saída</button>
                    <button class="tipo-btn"            id="btnIn"  onclick="setTipo('in')">⬆ Entrada</button>
                </div>
            </div>
            <div class="form-group" id="poteGroup">
                <label class="form-label">Pote</label>
                <select id="txPote" class="inp">
                    <option value="obrigacao">🏠 Obrigação</option>
                    <option value="reserva">🐷 Reserva</option>
                    <option value="lazer">⭐ Lazer</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Descrição</label>
                <input type="text" id="txDesc" class="inp" placeholder="Ex: Aluguel, iFood, Salário...">
            </div>
            <div class="form-group">
                <label class="form-label">Local / Estabelecimento <span style="opacity:.5;font-weight:500;text-transform:none;">(opcional)</span></label>
                <input type="text" id="txLocal" class="inp" placeholder="Ex: Mercado Condor, Nubank...">
            </div>
            <div class="form-group">
                <label class="form-label">Forma de Pagamento</label>
                <select id="txPagamento" class="inp">
                    <option value="pix">⚡ Pix</option>
                    <option value="debito">💳 Débito</option>
                    <option value="credito">🔵 Crédito</option>
                    <option value="dinheiro">💵 Dinheiro</option>
                </select>
            </div>
            <div style="display:flex;gap:10px;margin-top:18px;">
                <button id="btnDeleteTx" onclick="deleteTx()" class="btn-primary btn-danger" style="display:none;flex:0 0 48px;padding:.85rem 0;align-items:center;justify-content:center;">
                    <i data-lucide="trash-2" style="width:15px;height:15px;"></i>
                </button>
                <button onclick="saveTx()" class="btn-primary" style="flex:1;">SALVAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL: PARCELA -->
    <div id="modal-parcela" class="modal-overlay">
        <div class="modal-box" style="max-width:380px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
                <h2 style="font-size:1.1rem;font-weight:800;">Parcelamento</h2>
                <button onclick="closeModal('modal-parcela')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;">✕</button>
            </div>
            <input type="hidden" id="parcelaId">
            <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" id="parcelaNome" class="inp" placeholder="Ex: Celular POCO M7">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;">
                <div><label class="form-label">Parcela Atual</label><input type="number" id="parcelaAtual" class="inp" min="1" placeholder="3"></div>
                <div><label class="form-label">Total</label><input type="number" id="parcelaTotal" class="inp" min="1" placeholder="12"></div>
            </div>
            <div style="display:flex;gap:10px;">
                <button id="btnDeleteParcela" onclick="deleteParcela()" class="btn-primary btn-danger" style="display:none;flex:0 0 48px;padding:.85rem 0;align-items:center;justify-content:center;">
                    <i data-lucide="trash-2" style="width:15px;height:15px;"></i>
                </button>
                <button onclick="saveParcela()" class="btn-primary" style="flex:1;">SALVAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL: NUVEM -->
    <div id="modal-cloud" class="modal-overlay">
        <div class="modal-box" style="max-width:360px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
                <h2 style="font-size:1.1rem;font-weight:800;">Nuvem & Backup</h2>
                <button onclick="closeModal('modal-cloud')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;">✕</button>
            </div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button onclick="forceSync()" style="width:100%;padding:13px;border-radius:12px;border:2px dashed var(--accent);color:var(--accent);background:transparent;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.88rem;">
                    <i data-lucide="refresh-cw" style="width:15px;height:15px;"></i> SINCRONIZAR
                </button>
                <button onclick="doBackup()" style="width:100%;padding:13px;border-radius:12px;border:1px solid var(--glass-border);color:var(--text-main);background:transparent;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.88rem;">
                    <i data-lucide="download" style="width:15px;height:15px;"></i> BACKUP LOCAL
                </button>
                <label style="width:100%;padding:13px;border-radius:12px;border:1px solid var(--glass-border);color:var(--text-main);background:transparent;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.88rem;">
                    <i data-lucide="upload" style="width:15px;height:15px;"></i> RESTAURAR
                    <input type="file" hidden onchange="doRestore(this)">
                </label>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"><i class="fa-solid fa-circle-check" style="color:#34d399;"></i><span id="toast-msg"></span></div>

    <!-- FAB -->
    <button onclick="openCloudModal()" class="benai-fab" title="Nuvem & Backup">
        <div id="statusDot2" class="benai-fab-dot"></div>
        <i class="fa-solid fa-cloud"></i>
    </button>

    <script>
        const DB_KEY    = 'BENAI_FIN_V4';
        const TOKEN_KEY = 'BENAI_GLOBAL_TOKEN';
        const GIST_DESC = 'BENAI_FINANCE_DB';
        const GIST_FILE = 'finance_db.json';

        let db = { transactions: [], parcelamentos: [], lastUpdated: 0 };
        let viewDate    = new Date();
        let activeFilter = 'all';
        let currentTipo  = 'out';
        let gistId       = null;

        // ── INIT ──
        window.onload = async () => {
            initTheme();
            lucide.createIcons();
            setTodayDate();
            updateMonthLabel();
            await initApp();
        };

        async function initApp() {
            const shield = document.getElementById('cloud-shield');
            shield.style.display = 'flex';
            const token = localStorage.getItem(TOKEN_KEY);
            let loaded = false;
            if (token) {
                updateStatus('sync');
                try { loaded = await pullFromCloud(); } catch(e) { updateStatus('error'); }
            }
            if (!loaded) {
                const local = localStorage.getItem(DB_KEY);
                if (local) try { db = JSON.parse(local); } catch(e) {}
                updateStatus(token ? 'error' : 'offline');
            }
            if (!db.transactions)  db.transactions  = [];
            if (!db.parcelamentos) db.parcelamentos = [];
            shield.style.display = 'none';
            renderAll();
        }

        // ── CLOUD ──
        async function pullFromCloud() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return false;
            try {
                const gists = await fetch('https://api.github.com/gists', {
                    headers: { 'Authorization': `token ${token}` }
                }).then(r => r.json());
                const found = gists.find(g => g.description === GIST_DESC);
                if (found) {
                    gistId = found.id;
                    const detail = await fetch(found.url, {
                        headers: { 'Authorization': `token ${token}` }
                    }).then(r => r.json());
                    if (detail.files[GIST_FILE]) {
                        db = JSON.parse(detail.files[GIST_FILE].content);
                        localStorage.setItem(DB_KEY, JSON.stringify(db));
                        updateStatus('online');
                        return true;
                    }
                }
            } catch(e) { console.error(e); }
            return false;
        }

        async function saveData() {
            // ★ GUARD — nunca sobrescrever nuvem com dados vazios
            if (!db.transactions || db.transactions.length === 0) {
                const existing = localStorage.getItem(DB_KEY);
                if (existing) {
                    try {
                        const p = JSON.parse(existing);
                        if (p.transactions && p.transactions.length > 0) {
                            console.warn('[BENAI] saveData bloqueado: dados locais parecem vazios. Nuvem preservada.');
                            return;
                        }
                    } catch(e) {}
                }
            }
            db.lastUpdated = Date.now();
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return;
            updateStatus('sync');
            try {
                if (!gistId) {
                    const list = await fetch('https://api.github.com/gists', {
                        headers: { 'Authorization': `token ${token}` }
                    }).then(r => r.json());
                    const found = list.find(g => g.description === GIST_DESC);
                    if (found) gistId = found.id;
                }
                const payload = { description: GIST_DESC, public: false, files: { [GIST_FILE]: { content: JSON.stringify(db) } } };
                const url    = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
                const method = gistId ? 'PATCH' : 'POST';
                const res = await fetch(url, { method, headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { if (method === 'POST') { const j = await res.json(); gistId = j.id; } updateStatus('online'); }
                else updateStatus('error');
            } catch(e) { updateStatus('error'); }
        }

        // ── CASCATA ──
        function getMonthStr() { return `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}`; }
        function getMonthTxs() { const m = getMonthStr(); return db.transactions.filter(t => t.date.startsWith(m)); }

        function calcCascata() {
            const txs      = getMonthTxs();
            const receita  = txs.filter(t => t.tipo === 'in').reduce((a,b) => a+b.val, 0);
            const obrGasto = txs.filter(t => t.tipo === 'out' && t.pote === 'obrigacao').reduce((a,b) => a+b.val, 0);
            const resGasto = txs.filter(t => t.tipo === 'out' && t.pote === 'reserva').reduce((a,b) => a+b.val, 0);
            const lazGasto = txs.filter(t => t.tipo === 'out' && t.pote === 'lazer').reduce((a,b) => a+b.val, 0);
            const saldoLivre = Math.max(0, receita - obrGasto);
            return { receita, obrGasto, resGasto, lazGasto, saldoLivre, resMeta: saldoLivre * 0.8, lazTeto: saldoLivre * 0.2 };
        }

        // ── RENDER ──
        function renderAll() { renderDashboard(); renderTxList(); renderParcelamentos(); }

        function renderDashboard() {
            const { receita, obrGasto, resGasto, lazGasto, saldoLivre, resMeta, lazTeto } = calcCascata();
            document.getElementById('receitaTotal').innerText = fmtMoney(receita);
            document.getElementById('saldoLivre').innerText   = fmtMoney(saldoLivre);

            document.getElementById('obrVal').innerText  = fmtMoney(obrGasto);
            document.getElementById('obrMeta').innerText = receita > 0 ? `${((obrGasto/receita)*100).toFixed(0)}% da receita` : '—';
            document.getElementById('obrBar').style.width = (receita > 0 ? Math.min((obrGasto/receita)*100,100) : 0) + '%';

            document.getElementById('resVal').innerText  = fmtMoney(resGasto);
            document.getElementById('resMeta').innerText = `meta: ${fmtMoney(resMeta)}`;
            document.getElementById('resBar').style.width = (resMeta > 0 ? Math.min((resGasto/resMeta)*100,100) : 0) + '%';

            document.getElementById('lazVal').innerText  = fmtMoney(lazGasto);
            document.getElementById('lazMeta').innerText = `teto: ${fmtMoney(lazTeto)}`;
            document.getElementById('lazBar').style.width = (lazTeto > 0 ? Math.min((lazGasto/lazTeto)*100,100) : 0) + '%';

            // Aviso visual se Lazer ultrapassou o teto
            document.querySelector('.pote-card.laz').style.borderColor =
                (lazTeto > 0 && lazGasto > lazTeto) ? 'rgba(248,113,113,.5)' : 'rgba(251,146,60,.25)';
        }

        function renderTxList() {
            const MONTHS = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
            const PAGTO  = { pix:'<i class="fa-brands fa-pix" style="color:#2dd4bf;" title="Pix"></i>', credito:'<i class="fa-regular fa-credit-card" style="color:#a78bfa;" title="Crédito"></i>', debito:'<i class="fa-solid fa-credit-card" style="color:#3b82f6;" title="Débito"></i>', dinheiro:'<i class="fa-solid fa-money-bill-wave" style="color:#34d399;" title="Dinheiro"></i>' };
            const BADGE  = { obrigacao:'<span class="pote-badge badge-obr">Obrigação</span>', reserva:'<span class="pote-badge badge-res">Reserva</span>', lazer:'<span class="pote-badge badge-laz">Lazer</span>' };

            let txs = getMonthTxs();
            if      (activeFilter === 'in')  txs = txs.filter(t => t.tipo === 'in');
            else if (activeFilter === 'out') txs = txs.filter(t => t.tipo === 'out');
            else if (['obrigacao','reserva','lazer'].includes(activeFilter)) txs = txs.filter(t => t.pote === activeFilter);
            txs.sort((a,b) => b.date.localeCompare(a.date));

            const list = document.getElementById('txList');
            if (txs.length === 0) {
                list.innerHTML = `<div class="empty-state"><i class="fa-solid fa-receipt"></i><p style="font-weight:700;margin-top:8px;">Nenhum lançamento</p><p style="font-size:.8rem;margin-top:4px;">Toque em "Novo Lançamento" para começar</p></div>`;
                return;
            }
            list.innerHTML = txs.map(t => {
                const [y,m,d] = t.date.split('-');
                const isIn    = t.tipo === 'in';
                const badge   = isIn ? '<span class="pote-badge badge-in">Entrada</span>' : (BADGE[t.pote] || '');
                const local   = t.local ? `<span>📍 ${t.local}</span>` : '';
                return `
                <div class="tx-item">
                    <div class="tx-date-box">
                        <span class="tx-day">${d}</span>
                        <span class="tx-month">${MONTHS[parseInt(m)-1]}</span>
                    </div>
                    <div class="tx-info">
                        <div class="tx-desc">${t.desc || '—'}</div>
                        <div class="tx-sub">${badge} ${PAGTO[t.pagamento]||''} ${local}</div>
                    </div>
                    <div class="tx-right">
                        <span class="tx-val ${isIn?'in':'out'}">${isIn?'+':'−'}${fmtMoney(t.val)}</span>
                        <div class="tx-actions">
                            <button class="act act-edit" onclick="editTx('${t.id}')"><i class="fa-solid fa-pencil"></i></button>
                            <button class="act act-del"  onclick="delTxDirect('${t.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderParcelamentos() {
            const list = document.getElementById('parcelaList');
            if (!db.parcelamentos || db.parcelamentos.length === 0) {
                list.innerHTML = `<div class="empty-state" style="padding:16px;"><p style="font-size:.8rem;">Nenhum parcelamento cadastrado.<br>Use o botão "Adicionar" para registrar suas dívidas.</p></div>`;
                return;
            }
            list.innerHTML = db.parcelamentos.map(p => {
                const pct    = Math.round((p.atual / p.total) * 100);
                const restam = p.total - p.atual;
                return `
                <div class="parcela-card glass">
                    <div class="parcela-header">
                        <div>
                            <p class="parcela-nome">${p.nome}</p>
                            <p class="parcela-info">Parcela ${p.atual} de ${p.total}</p>
                        </div>
                        <button class="edit-parcela" onclick="openParcelaModal('${p.id}')">
                            <i class="fa-solid fa-pencil"></i> editar
                        </button>
                    </div>
                    <div class="parcela-bar-bg"><div class="parcela-bar-fill" style="width:${pct}%"></div></div>
                    <div class="parcela-pct">
                        <span>${pct}% concluído</span>
                        <span>${restam} restante${restam!==1?'s':''}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // ── TX MODAL ──
        function openTxModal() {
            document.getElementById('txId').value = '';
            document.getElementById('txVal').value = '';
            document.getElementById('txDesc').value = '';
            document.getElementById('txLocal').value = '';
            document.getElementById('txPote').value = 'obrigacao';
            document.getElementById('txPagamento').value = 'pix';
            document.getElementById('btnDeleteTx').style.display = 'none';
            document.getElementById('txModalTitle').innerText = 'Novo Lançamento';
            setTodayDate();
            setTipo('out');
            openModal('modal-tx');
            lucide.createIcons();
        }

        function editTx(id) {
            const t = db.transactions.find(x => x.id === id);
            if (!t) return;
            document.getElementById('txId').value        = t.id;
            document.getElementById('txVal').value       = fmtMoney(t.val);
            document.getElementById('txDate').value      = t.date;
            document.getElementById('txDesc').value      = t.desc || '';
            document.getElementById('txLocal').value     = t.local || '';
            document.getElementById('txPote').value      = t.pote || 'obrigacao';
            document.getElementById('txPagamento').value = t.pagamento || 'pix';
            document.getElementById('btnDeleteTx').style.display = 'flex';
            document.getElementById('txModalTitle').innerText = 'Editar Lançamento';
            setTipo(t.tipo);
            openModal('modal-tx');
            lucide.createIcons();
        }

        function saveTx() {
            const val  = parseMoney(document.getElementById('txVal').value);
            const desc = document.getElementById('txDesc').value.trim();
            if (!val || val <= 0) { showToast('Informe um valor válido'); return; }
            if (!desc)            { showToast('Informe uma descrição'); return; }
            const id       = document.getElementById('txId').value;
            const date     = document.getElementById('txDate').value;
            const pote     = currentTipo === 'out' ? document.getElementById('txPote').value : null;
            const local    = document.getElementById('txLocal').value.trim();
            const pagamento= document.getElementById('txPagamento').value;
            if (id) {
                const idx = db.transactions.findIndex(x => x.id === id);
                if (idx > -1) db.transactions[idx] = { ...db.transactions[idx], val, tipo: currentTipo, date, desc, pote, local, pagamento };
            } else {
                db.transactions.push({ id: Date.now().toString(), val, tipo: currentTipo, date, desc, pote, local, pagamento });
            }
            saveData(); closeModal('modal-tx'); renderAll(); showToast('Lançamento salvo!');
        }

        function deleteTx() {
            const id = document.getElementById('txId').value;
            if (!id || !confirm('Excluir este lançamento?')) return;
            db.transactions = db.transactions.filter(x => x.id !== id);
            saveData(); closeModal('modal-tx'); renderAll(); showToast('Removido');
        }

        function delTxDirect(id) {
            if (!confirm('Excluir?')) return;
            db.transactions = db.transactions.filter(x => x.id !== id);
            saveData(); renderAll(); showToast('Removido');
        }

        // ── PARCELA MODAL ──
        function openParcelaModal(id) {
            if (id) {
                const p = db.parcelamentos.find(x => x.id === id);
                if (!p) return;
                document.getElementById('parcelaId').value    = p.id;
                document.getElementById('parcelaNome').value  = p.nome;
                document.getElementById('parcelaAtual').value = p.atual;
                document.getElementById('parcelaTotal').value = p.total;
                document.getElementById('btnDeleteParcela').style.display = 'flex';
            } else {
                ['parcelaId','parcelaNome','parcelaAtual','parcelaTotal'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('btnDeleteParcela').style.display = 'none';
            }
            openModal('modal-parcela'); lucide.createIcons();
        }

        function saveParcela() {
            const nome  = document.getElementById('parcelaNome').value.trim();
            const atual = parseInt(document.getElementById('parcelaAtual').value);
            const total = parseInt(document.getElementById('parcelaTotal').value);
            if (!nome)                  { showToast('Informe o nome'); return; }
            if (!atual || atual < 1)    { showToast('Parcela atual inválida'); return; }
            if (!total || total < atual) { showToast('Total inválido'); return; }
            const id = document.getElementById('parcelaId').value;
            if (id) {
                const idx = db.parcelamentos.findIndex(x => x.id === id);
                if (idx > -1) db.parcelamentos[idx] = { id, nome, atual, total };
            } else {
                db.parcelamentos.push({ id: Date.now().toString(), nome, atual, total });
            }
            saveData(); closeModal('modal-parcela'); renderParcelamentos(); showToast('Parcelamento salvo!');
        }

        function deleteParcela() {
            const id = document.getElementById('parcelaId').value;
            if (!id || !confirm('Excluir este parcelamento?')) return;
            db.parcelamentos = db.parcelamentos.filter(x => x.id !== id);
            saveData(); closeModal('modal-parcela'); renderParcelamentos(); showToast('Removido');
        }

        // ── HELPERS ──
        function setTipo(tipo) {
            currentTipo = tipo;
            document.getElementById('btnOut').className = `tipo-btn ${tipo==='out'?'active-out':''}`;
            document.getElementById('btnIn').className  = `tipo-btn ${tipo==='in'?'active-in':''}`;
            document.getElementById('poteGroup').style.display = tipo === 'out' ? 'block' : 'none';
        }

        function setTodayDate() { document.getElementById('txDate').value = new Date().toISOString().split('T')[0]; }

        function setFilter(f) {
            activeFilter = f;
            const map = { all:'fAll', in:'fIn', out:'fOut', obrigacao:'fObr', reserva:'fRes', lazer:'fLaz' };
            Object.entries(map).forEach(([key, elId]) => {
                const el = document.getElementById(elId);
                if (el) el.classList.toggle('active', key === f);
            });
            renderTxList();
        }

        function changeMonth(d) { viewDate.setMonth(viewDate.getMonth()+d); updateMonthLabel(); renderAll(); }
        function updateMonthLabel() {
            const M = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            document.getElementById('monthLabel').innerText = `${M[viewDate.getMonth()].slice(0,3).toUpperCase()} ${viewDate.getFullYear()}`;
        }

        function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openCloudModal() { openModal('modal-cloud'); lucide.createIcons(); }

        function updateStatus(s) {
            const c = { online:'#34d399', sync:'#38bdf8', error:'#f87171', offline:'#94a3b8' }[s] || '#94a3b8';
            ['statusDot','statusDot2'].forEach(id => { const el = document.getElementById(id); if(el) el.style.background = c; });
        }

        function forceSync()  { closeModal('modal-cloud'); initApp(); }
        function doBackup()   { BenaiCore.backupJSON(db, 'finance_backup.json'); }
        function doRestore(input) {
            BenaiCore.restoreJSON(input, data => {
                db = data;
                if (!db.transactions)  db.transactions  = [];
                if (!db.parcelamentos) db.parcelamentos = [];
                saveData(); renderAll(); showToast('Dados restaurados!');
            });
        }
    </script>
</body>
</html>
