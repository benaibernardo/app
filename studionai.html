<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Studio | Biblioteca de Exercícios</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fit: {
                            black: '#121212',
                            dark: '#1e1e1e',
                            blue: '#3b82f6',
                            bluehover: '#2563eb',
                            orange: '#f97316',
                            orangehover: '#ea580c',
                            light: '#f4f4f5',
                            white: '#ffffff'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        head: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f4f4f5; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        
        /* Animações Táteis */
        .btn-tactile { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-tactile:active { transform: scale(0.96); }
        
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -10px rgba(59, 130, 246, 0.15); }
        
        /* Imagem de Capa do Vídeo */
        .thumb-container { position: relative; padding-top: 56.25%; /* 16:9 Aspect Ratio */ overflow: hidden; background: #1e1e1e; }
        .thumb-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: opacity 0.3s; }
        .card-hover:hover .thumb-img { opacity: 1; transform: scale(1.05); transition: all 0.5s ease; }
        
        .play-overlay { position: absolute; inset: 0; display: flex; items-center; justify-content: center; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; }
        .card-hover:hover .play-overlay { opacity: 1; }
    
        /* ★ BENAI CLOUD FAB ★ */
        .benai-fab {
            position: fixed; bottom: 24px; right: 24px; z-index: 90;
            width: 52px; height: 52px; border-radius: 50%;
            background: #3b82f6; color: white;
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(59,130,246,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1.1rem;
        }
        .benai-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(59,130,246,0.4); }
        .benai-fab:active { transform: scale(0.96); }
        .benai-fab-dot {
            position: absolute; top: 3px; right: 3px;
            width: 12px; height: 12px; border-radius: 50%;
            background: #94a3b8; border: 2px solid white;
            transition: background 0.3s;
        }
    
</style>
</head>
<body class="text-fit-black font-sans min-h-screen flex flex-col">
    <!-- BENAI AUTH GUARD -->
    <script src="auth.js"></script>
    <script src="benai-core.js"></script>


    <!-- Header -->
    <header class="bg-fit-black text-white sticky top-0 z-30 shadow-xl border-b border-fit-blue/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-fit-blue to-fit-orange rounded-lg flex items-center justify-center text-white shadow-[0_0_15px_rgba(59,130,246,0.4)]">
                    <i data-lucide="database" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-head text-2xl font-black tracking-tight leading-none uppercase italic">Studio<span class="text-fit-blue">Nai</span></h1>
                    <p class="text-fit-orange text-[10px] font-bold uppercase tracking-[0.2em] mt-0.5">Banco de Exercícios</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                
                <button onclick="openAddModal()" class="btn-tactile bg-fit-blue hover:bg-fit-bluehover text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 shadow-lg shadow-fit-blue/30">
                    <i data-lucide="plus" class="w-4 h-4"></i> Novo Exercício
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Controls Bar -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-zinc-200 mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
            
            <!-- Search -->
            <div class="relative w-full md:w-96">
                <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-zinc-400 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="Buscar exercício, limitação..." class="w-full pl-10 pr-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-fit-blue focus:border-transparent transition-all text-sm font-medium">
            </div>

            <!-- Filters -->
            <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
                <select id="filterMuscle" class="px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-fit-blue text-sm font-medium cursor-pointer flex-1 md:flex-none">
                    <option value="all">Todos os Músculos</option>
                    <!-- Injetado via JS -->
                </select>

                <select id="filterEquip" class="px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-fit-blue text-sm font-medium cursor-pointer flex-1 md:flex-none">
                    <option value="all">Qualquer Equipamento</option>
                    <!-- Injetado via JS -->
                </select>
                
                <select id="filterLimitation" class="px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-fit-blue text-sm font-medium cursor-pointer flex-1 md:flex-none">
                    <option value="all">Qualquer Limitação</option>
                    <option value="none">Sem Limitação Específica</option>
                    <!-- Injetado via JS -->
                </select>

                <button id="btnFilterStar" onclick="toggleStarFilter()" class="p-2.5 bg-zinc-50 border border-zinc-200 rounded-xl hover:bg-zinc-100 transition-colors text-zinc-400" title="Ver apenas Destaques da Semana">
                    <i data-lucide="star" class="w-5 h-5"></i>
                </button>
                <button onclick="openCategoryModal()" class="p-2.5 bg-zinc-50 border border-zinc-200 rounded-xl hover:bg-zinc-100 transition-colors text-zinc-600 font-medium text-sm flex items-center gap-2" title="Gerenciar Categorias">
                    <i data-lucide="tags" class="w-4 h-4"></i> Categorias
                </button>
            </div>
        </div>

        <!-- Cloud Status -->
        <div id="cloudStatus" class="mb-6 hidden items-center gap-2 text-sm font-medium px-4 py-2 rounded-lg">
            <!-- Injetado via JS -->
        </div>

        <!-- Gallery Grid -->
        <div id="exerciseGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards injetados via JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="w-20 h-20 bg-zinc-100 rounded-full flex items-center justify-center mx-auto mb-4 text-zinc-300">
                <i data-lucide="video" class="w-10 h-10"></i>
            </div>
            <h3 class="text-xl font-head font-bold text-fit-black">Nenhum exercício encontrado</h3>
            <p class="text-zinc-500 mt-2 max-w-md mx-auto">Sua biblioteca está vazia ou nenhum exercício corresponde aos filtros. Clique em "Novo Exercício" para começar a montar seu arsenal.</p>
        </div>

    </main>

    <!-- MODAL: ADICIONAR / EDITAR EXERCÍCIO -->
    <div id="addModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-fit-black/60 backdrop-blur-sm transition-opacity" onclick="closeAddModal()"></div>
        <div class="absolute inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col" id="addModalPanel">
            
            <div class="px-6 py-5 border-b border-zinc-100 flex justify-between items-center bg-white">
                <h2 id="modalTitle" class="text-xl font-head font-bold text-fit-black uppercase italic">Novo Exercício</h2>
                <button onclick="closeAddModal()" class="p-2 text-zinc-400 hover:text-fit-orange hover:bg-orange-50 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 custom-scrollbar">
                <form id="exerciseForm" onsubmit="saveExercise(event)" class="space-y-5">
                    <input type="hidden" id="exId">
                    
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Nome do Exercício *</label>
                        <input type="text" id="exName" required class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-fit-blue outline-none font-medium" placeholder="Ex: Agachamento Búlgaro com Halteres">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Link do Vídeo (YouTube/Insta) *</label>
                        <input type="url" id="exUrl" required class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-fit-blue outline-none text-sm" placeholder="https://youtube.com/watch?v=...">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Capa / Thumbnail (Opcional)</label>
                        <div id="thumbDropZone" class="w-full border-2 border-dashed border-zinc-300 rounded-xl p-4 text-center cursor-pointer hover:bg-zinc-50 transition-colors relative overflow-hidden" onclick="document.getElementById('exThumbFile').click()" tabindex="0">
                            <div id="thumbPlaceholder" class="flex flex-col items-center justify-center text-zinc-400 pointer-events-none py-2">
                                <i data-lucide="image-plus" class="w-8 h-8 mb-2"></i>
                                <span class="text-xs font-medium">Clique para escolher ou cole a imagem (Ctrl+V)</span>
                            </div>
                            <img id="thumbPreview" class="hidden max-h-32 mx-auto object-contain pointer-events-none rounded-lg">
                        </div>
                        <input type="file" id="exThumbFile" class="hidden" accept="image/*">
                        <input type="hidden" id="exThumbBase64">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider">Grupo Muscular</label>
                                <button type="button" onclick="openCategoryModal()" class="text-[10px] text-fit-blue hover:underline font-bold">Editar</button>
                            </div>
                            <select id="exMuscle" class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-fit-blue outline-none text-sm font-medium">
                                <!-- Injetado via JS -->
                            </select>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider">Equipamento</label>
                                <button type="button" onclick="openCategoryModal()" class="text-[10px] text-fit-blue hover:underline font-bold">Editar</button>
                            </div>
                            <select id="exEquip" class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-fit-blue outline-none text-sm font-medium">
                                <!-- Injetado via JS -->
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider">Limitação / Patologia Específica</label>
                            <button type="button" onclick="openCategoryModal()" class="text-[10px] text-fit-blue hover:underline font-bold">Editar</button>
                        </div>
                        <select id="exLimitation" class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-fit-blue outline-none text-sm font-medium">
                            <option value="">Nenhuma (Geral)</option>
                            <!-- Injetado via JS -->
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Nível de Dificuldade</label>
                        <div class="flex gap-2">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="exLevel" value="Iniciante" class="peer sr-only" checked>
                                <div class="text-center px-2 py-2 text-xs font-bold rounded-lg border border-zinc-200 text-zinc-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 peer-checked:border-emerald-200 transition-colors">Iniciante</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="exLevel" value="Intermediário" class="peer sr-only">
                                <div class="text-center px-2 py-2 text-xs font-bold rounded-lg border border-zinc-200 text-zinc-500 peer-checked:bg-amber-50 peer-checked:text-amber-700 peer-checked:border-amber-200 transition-colors">Intermed.</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="exLevel" value="Avançado" class="peer sr-only">
                                <div class="text-center px-2 py-2 text-xs font-bold rounded-lg border border-zinc-200 text-zinc-500 peer-checked:bg-red-50 peer-checked:text-red-700 peer-checked:border-red-200 transition-colors">Avançado</div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Anotações / Limitações (Opcional)</label>
                        <textarea id="exNotes" rows="3" class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-fit-blue outline-none text-sm resize-none" placeholder="Ex: Excelente variação para alunos com hérnia lombar, pois não comprime a coluna."></textarea>
                    </div>

                </form>
            </div>

            <div class="p-6 border-t border-zinc-100 bg-white">
                <button type="submit" form="exerciseForm" class="btn-tactile w-full bg-fit-black hover:bg-zinc-800 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider text-sm flex items-center justify-center gap-2 shadow-lg">
                    <i data-lucide="save" class="w-4 h-4"></i> Salvar Exercício
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL: NUVEM & BACKUP -->
    <div id="settingsModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-fit-black/60 backdrop-blur-sm" onclick="closeSettingsModal()"></div>
        <div class="relative w-full max-w-md bg-white rounded-2xl shadow-2xl p-6">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-head font-bold text-fit-black flex items-center gap-2"><i data-lucide="cloud" class="w-5 h-5 text-fit-blue"></i> Nuvem & Backup</h3>
                <button onclick="closeSettingsModal()" class="text-zinc-400 hover:text-fit-orange"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-3">
                <button onclick="forceSync()" class="w-full flex items-center justify-center gap-2 bg-fit-blue text-white py-3 rounded-xl font-bold text-sm hover:bg-fit-bluehover transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sincronizar com Nuvem
                </button>
                <button onclick="backupJSON()" class="w-full flex items-center justify-center gap-2 border border-zinc-200 text-zinc-700 py-3 rounded-xl font-bold text-sm hover:bg-zinc-50 transition-colors">
                    <i data-lucide="download" class="w-4 h-4"></i> Backup Local (JSON)
                </button>
                <label class="w-full flex items-center justify-center gap-2 border border-zinc-200 text-zinc-700 py-3 rounded-xl font-bold text-sm hover:bg-zinc-50 transition-colors cursor-pointer">
                    <i data-lucide="upload" class="w-4 h-4"></i> Restaurar Backup
                    <input type="file" hidden onchange="restoreJSON(this)">
                </label>
            </div>
        </div>
    </div>

    <!-- MODAL: GERENCIAR CATEGORIAS -->
    <div id="categoryModal" class="fixed inset-0 z-[80] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-fit-black/60 backdrop-blur-sm" onclick="closeCategoryModal()"></div>
        <div class="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-zinc-100 flex justify-between items-center">
                <h3 class="text-lg font-head font-bold text-fit-black flex items-center gap-2"><i data-lucide="tags" class="w-5 h-5 text-fit-orange"></i> Gerenciar Categorias</h3>
                <button onclick="closeCategoryModal()" class="text-zinc-400 hover:text-fit-orange"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 custom-scrollbar space-y-4">
                
                <!-- Accordion Músculos -->
                <div class="border border-zinc-200 rounded-xl overflow-hidden">
                    <button onclick="toggleAccordion('accMuscles')" class="w-full p-4 bg-zinc-50 hover:bg-zinc-100 flex justify-between items-center font-bold text-sm text-zinc-700 transition-colors">
                        Grupos Musculares <i data-lucide="chevron-down" class="w-4 h-4 transition-transform" id="icon-accMuscles"></i>
                    </button>
                    <div id="accMuscles" class="hidden p-4 border-t border-zinc-200 bg-white">
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="newMuscle" class="flex-1 px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-fit-blue" placeholder="Adicionar músculo...">
                            <button onclick="addCategory('muscles', 'newMuscle')" class="bg-fit-black text-white px-3 py-2 rounded-lg hover:bg-zinc-800 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                        <div id="listMuscles" class="space-y-2"></div>
                    </div>
                </div>

                <!-- Accordion Equipamentos -->
                <div class="border border-zinc-200 rounded-xl overflow-hidden">
                    <button onclick="toggleAccordion('accEquips')" class="w-full p-4 bg-zinc-50 hover:bg-zinc-100 flex justify-between items-center font-bold text-sm text-zinc-700 transition-colors">
                        Equipamentos <i data-lucide="chevron-down" class="w-4 h-4 transition-transform" id="icon-accEquips"></i>
                    </button>
                    <div id="accEquips" class="hidden p-4 border-t border-zinc-200 bg-white">
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="newEquip" class="flex-1 px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-fit-blue" placeholder="Adicionar equipamento...">
                            <button onclick="addCategory('equips', 'newEquip')" class="bg-fit-black text-white px-3 py-2 rounded-lg hover:bg-zinc-800 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                        <div id="listEquips" class="space-y-2"></div>
                    </div>
                </div>

                <!-- Accordion Limitações -->
                <div class="border border-zinc-200 rounded-xl overflow-hidden">
                    <button onclick="toggleAccordion('accLimits')" class="w-full p-4 bg-zinc-50 hover:bg-zinc-100 flex justify-between items-center font-bold text-sm text-zinc-700 transition-colors">
                        Limitações / Patologias <i data-lucide="chevron-down" class="w-4 h-4 transition-transform" id="icon-accLimits"></i>
                    </button>
                    <div id="accLimits" class="hidden p-4 border-t border-zinc-200 bg-white">
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="newLimitation" class="flex-1 px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-fit-blue" placeholder="Adicionar limitação...">
                            <button onclick="addCategory('limitations', 'newLimitation')" class="bg-fit-black text-white px-3 py-2 rounded-lg hover:bg-zinc-800 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                        <div id="listLimitations" class="space-y-2"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- ESTADO DA APLICAÇÃO ---
        const TOKEN_KEY = 'BENAI_GLOBAL_TOKEN';
        const GIST_DESC = 'BENAI_STUDIO_DB';
        const GIST_FILENAME = 'studio_db.json';
        const DB_KEY = 'BENAI_STUDIO_LOCAL';
        let gistId = null;

        let exercises = [];
        let isStarFilterActive = false;
        
        // Categorias Padrão
        let categories = {
            muscles: ['Peito', 'Costas', 'Pernas (Geral)', 'Quadríceps', 'Posterior de Coxa', 'Glúteos', 'Ombros', 'Braços', 'Core / Abdômen', 'Fullbody'],
            equips: ['Peso Corporal', 'Halteres', 'Barra Livre', 'Máquina', 'Polia / Cabo', 'Kettlebell', 'Elástico / Band'],
            limitations: ['Hérnia de Disco Lombar', 'Hérnia Cervical', 'Condromalácia Patelar', 'Epicondilite', 'Síndrome do Impacto (Ombro)', 'Bursite', 'Tendinite', 'Gestante', 'Idoso (Mobilidade Reduzida)', 'Pós-operatório LCA']
        };

        // --- INICIALIZAÇÃO ---
        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            renderCategoryOptions();
            setupEventListeners();

            // NUVEM PRIMEIRO — local só como fallback
            const { token } = getGistConfig();
            let loaded = false;
            if(token) {
                updateCloudStatus('syncing', 'Sincronizando...');
                try { loaded = await syncFromGist(true); } catch(e) {}
            }
            if(!loaded) {
                loadLocalData();
                renderCategoryOptions();
            }
        });

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', renderGallery);
            document.getElementById('filterMuscle').addEventListener('change', renderGallery);
            document.getElementById('filterEquip').addEventListener('change', renderGallery);
            document.getElementById('filterLimitation').addEventListener('change', renderGallery);

            // Image Paste Event
            document.getElementById('addModalPanel').addEventListener('paste', function(e) {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file') {
                        const blob = item.getAsFile();
                        processImageFile(blob);
                    }
                }
            });

            // Image File Input Event
            document.getElementById('exThumbFile').addEventListener('change', function(e) {
                if(e.target.files[0]) processImageFile(e.target.files[0]);
            });
        }

        // --- PROCESSAMENTO DE IMAGEM ---
        function processImageFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    let scaleSize = 1;
                    if (img.width > MAX_WIDTH) {
                        scaleSize = MAX_WIDTH / img.width;
                    }
                    canvas.width = img.width * scaleSize;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // 60% quality
                    
                    document.getElementById('thumbPreview').src = dataUrl;
                    document.getElementById('thumbPreview').classList.remove('hidden');
                    document.getElementById('thumbPlaceholder').classList.add('hidden');
                    document.getElementById('exThumbBase64').value = dataUrl;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        // --- LÓGICA DE DADOS (LOCAL & GIST) ---
        function getGistConfig() {
            return { token: localStorage.getItem(TOKEN_KEY) || '' };
        }

        function loadLocalData() {
            const saved = localStorage.getItem(DB_KEY);
            if(saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.exercises) exercises = parsed.exercises;
                    if(parsed.categories) categories = parsed.categories;
                } catch(e) {}
                renderGallery();
                return;
            }
            // legado: migrar chaves antigas para o novo formato unificado
            const legacyEx = localStorage.getItem('fit_exercises');
            if (legacyEx) exercises = JSON.parse(legacyEx);
            const legacyCat = localStorage.getItem('fit_categories');
            if (legacyCat) categories = JSON.parse(legacyCat);
            // salvar no novo formato e limpar as chaves antigas
            saveLocalData();
            localStorage.removeItem('fit_exercises');
            localStorage.removeItem('fit_categories');
            
            renderGallery();
        }

        function saveLocalData() {
            localStorage.setItem(DB_KEY, JSON.stringify({ exercises, categories }));
            renderGallery();
            
            // Sincroniza com a nuvem em background se configurado
            if(getGistConfig().token) {
                syncToGist();
            }
        }

        // --- GERENCIAMENTO DE CATEGORIAS ---
        function renderCategoryOptions() {
            // Filtros
            const fMuscle = document.getElementById('filterMuscle');
            fMuscle.innerHTML = '<option value="all">Todos os Músculos</option>' + categories.muscles.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const fEquip = document.getElementById('filterEquip');
            fEquip.innerHTML = '<option value="all">Qualquer Equipamento</option>' + categories.equips.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const fLimit = document.getElementById('filterLimitation');
            fLimit.innerHTML = '<option value="all">Qualquer Limitação</option><option value="none">Sem Limitação Específica</option>' + categories.limitations.map(c => `<option value="${c}">${c}</option>`).join('');

            // Formulário Add/Edit
            const exMuscle = document.getElementById('exMuscle');
            exMuscle.innerHTML = categories.muscles.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const exEquip = document.getElementById('exEquip');
            exEquip.innerHTML = categories.equips.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const exLimit = document.getElementById('exLimitation');
            exLimit.innerHTML = '<option value="">Nenhuma (Geral)</option>' + categories.limitations.map(c => `<option value="${c}">${c}</option>`).join('');
            
            // Modal de Configurações
            renderCategoryList('muscles', 'listMuscles');
            renderCategoryList('equips', 'listEquips');
            renderCategoryList('limitations', 'listLimitations');
        }

        function renderCategoryList(type, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = categories[type].map(c => `
                <div class="flex items-center gap-2 bg-zinc-100 px-3 py-1.5 rounded-lg text-sm font-medium text-zinc-700 mb-2">
                    ${c}
                    <button onclick="removeCategory('${type}', '${c}')" class="text-zinc-400 hover:text-fit-orange ml-1"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addCategory(type, inputId) {
            const input = document.getElementById(inputId);
            const val = input.value.trim();
            if(val && !categories[type].includes(val)) {
                categories[type].push(val);
                input.value = '';
                saveLocalData();
                renderCategoryOptions();
            }
        }

        function removeCategory(type, val) {
            categories[type] = categories[type].filter(c => c !== val);
            saveLocalData();
            renderCategoryOptions();
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        // --- INTEGRAÇÃO GIST ---
        async function syncToGist() {
            const { token } = getGistConfig();
            if (!token) return;
            // ★ GUARD — nunca sobrescrever a nuvem com dados vazios
            if (!exercises || exercises.length === 0) {
                const existing = localStorage.getItem(DB_KEY);
                if (existing) {
                    try {
                        const parsed = JSON.parse(existing);
                        if (parsed.exercises && parsed.exercises.length > 0) {
                            console.warn('[BENAI] syncToGist bloqueado: exercises vazio. Nuvem preservada.');
                            return;
                        }
                    } catch(e) {}
                }
            }

            updateCloudStatus('syncing', 'Salvando na nuvem...');
            try {
                // Descobrir gistId se ainda não temos
                if(!gistId) {
                    const list = await fetch('https://api.github.com/gists', {
                        headers: { 'Authorization': `token ${token}` }
                    }).then(r => r.json());
                    const found = list.find(g => g.description === GIST_DESC);
                    if(found) gistId = found.id;
                }

                const payload = {
                    description: GIST_DESC,
                    public: false,
                    files: { [GIST_FILENAME]: { content: JSON.stringify({ exercises, categories }) } }
                };
                let url = 'https://api.github.com/gists';
                let method = 'POST';
                if(gistId) { url += '/' + gistId; method = 'PATCH'; }

                const response = await fetch(url, {
                    method,
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    if(method === 'POST') { const j = await response.json(); gistId = j.id; }
                    updateCloudStatus('success', 'Salvo na nuvem');
                } else {
                    throw new Error('Falha ao salvar');
                }
            } catch (error) {
                console.error(error);
                updateCloudStatus('error', 'Erro ao sincronizar');
            }
        }

        async function syncFromGist(silent = false) {
            const { token } = getGistConfig();
            if (!token) {
                if(!silent) Swal.fire('Token necessário', 'Configure o Token GitHub no índice (index.html).', 'warning');
                return false;
            }

            if(!silent) updateCloudStatus('syncing', 'Baixando da nuvem...');
            try {
                const list = await fetch('https://api.github.com/gists', {
                    headers: { 'Authorization': `token ${token}` }
                }).then(r => r.json());

                const found = list.find(g => g.description === GIST_DESC);
                if(!found) {
                    if(!silent) updateCloudStatus('error', 'Nenhum dado na nuvem');
                    return false;
                }

                gistId = found.id;
                const gist = await fetch(found.url, {
                    headers: { 'Authorization': `token ${token}` }
                }).then(r => r.json());

                const fileContent = gist.files[GIST_FILENAME]?.content;
                if (fileContent) {
                    const data = JSON.parse(fileContent);
                    if (data.exercises) exercises = data.exercises;
                    if (data.categories) categories = data.categories;
                    saveLocalData();
                    renderGallery();
                    renderCategoryOptions();
                    if(!silent) updateCloudStatus('success', 'Sincronizado com sucesso');
                    return true;
                }
            } catch (error) {
                console.error(error);
                if(!silent) updateCloudStatus('error', 'Erro de conexão');
                if(!silent) Swal.fire('Erro', 'Não foi possível baixar os dados.', 'error');
            }
            return false;
        }

        function updateCloudStatus(state, msg) {
            // Atualizar ponto de status no FAB
            const dot = document.getElementById('fabStatusDot');
            if(dot) {
                const colors = { syncing: '#38bdf8', success: '#34d399', error: '#f87171' };
                dot.style.background = colors[state] || '#94a3b8';
            }
            const el = document.getElementById('cloudStatus');
            el.classList.remove('hidden', 'bg-blue-50', 'text-blue-600', 'bg-emerald-50', 'text-emerald-600', 'bg-red-50', 'text-red-600');
            
            let icon = '';
            if(state === 'syncing') {
                el.classList.add('bg-blue-50', 'text-blue-600', 'flex');
                icon = '<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i>';
            } else if(state === 'success') {
                el.classList.add('bg-emerald-50', 'text-emerald-600', 'flex');
                icon = '<i data-lucide="check-circle" class="w-4 h-4"></i>';
                setTimeout(() => el.classList.add('hidden'), 3000);
            } else if(state === 'error') {
                el.classList.add('bg-red-50', 'text-red-600', 'flex');
                icon = '<i data-lucide="alert-triangle" class="w-4 h-4"></i>';
            }
            
            el.innerHTML = `${icon} <span>${msg}</span>`;
            lucide.createIcons();
        }

        // --- UTILITÁRIOS ---
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // --- RENDERIZAÇÃO DA GALERIA ---
        function renderGallery() {
            const grid = document.getElementById('exerciseGrid');
            const emptyState = document.getElementById('emptyState');
            
            const query = document.getElementById('searchInput').value.toLowerCase();
            const muscle = document.getElementById('filterMuscle').value;
            const equip = document.getElementById('filterEquip').value;
            const limitation = document.getElementById('filterLimitation').value;

            grid.innerHTML = '';

            let filtered = exercises.filter(ex => {
                const matchQuery = ex.name.toLowerCase().includes(query) || (ex.notes && ex.notes.toLowerCase().includes(query));
                const matchMuscle = muscle === 'all' || ex.muscle === muscle;
                const matchEquip = equip === 'all' || ex.equip === equip;
                
                let matchLimit = true;
                if (limitation === 'none') {
                    matchLimit = !ex.limitation;
                } else if (limitation !== 'all') {
                    matchLimit = ex.limitation === limitation;
                }

                const matchStar = isStarFilterActive ? ex.isHighlight : true;
                
                return matchQuery && matchMuscle && matchEquip && matchLimit && matchStar;
            });

            // Ordena: Destaques primeiro, depois ordem alfabética
            filtered.sort((a, b) => {
                if(a.isHighlight && !b.isHighlight) return -1;
                if(!a.isHighlight && b.isHighlight) return 1;
                return a.name.localeCompare(b.name);
            });

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                emptyState.classList.add('hidden');

                filtered.forEach(ex => {
                    const thumbUrl = ex.thumbBase64 || 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=800&q=80'; // Fallback genérico
                    
                    const levelColors = {
                        'Iniciante': 'bg-emerald-100 text-emerald-700',
                        'Intermediário': 'bg-amber-100 text-amber-700',
                        'Avançado': 'bg-red-100 text-red-700'
                    };

                    const card = document.createElement('div');
                    
                    // Se tiver limitação, a borda fica laranja e mais grossa
                    const borderClass = ex.limitation ? 'border-fit-orange border-2 shadow-md shadow-fit-orange/20' : (ex.isHighlight ? 'border-fit-blue shadow-md' : 'border-zinc-200 shadow-sm');
                    
                    card.className = `bg-white rounded-2xl ${borderClass} overflow-hidden card-hover relative flex flex-col h-full`;
                    
                    card.innerHTML = `
                        <!-- Thumbnail Area -->
                        <div class="thumb-container cursor-pointer" onclick="window.open('${ex.url}', '_blank')">
                            <img src="${thumbUrl}" alt="${ex.name}" class="thumb-img">
                            <div class="play-overlay">
                                <div class="w-12 h-12 bg-fit-blue rounded-full flex items-center justify-center text-white shadow-lg">
                                    <i data-lucide="external-link" class="w-5 h-5 ml-0.5"></i>
                                </div>
                            </div>
                            <div class="absolute top-3 left-3 flex flex-col gap-1.5 items-start">
                                <span class="px-2 py-1 bg-black/70 backdrop-blur-sm text-white text-[10px] font-bold uppercase tracking-wider rounded-md border border-white/10">
                                    ${ex.muscle}
                                </span>
                                ${ex.limitation ? `<span class="px-2 py-1 bg-fit-orange/90 backdrop-blur-sm text-white text-[10px] font-bold uppercase tracking-wider rounded-md border border-white/20 flex items-center gap-1"><i data-lucide="alert-circle" class="w-3 h-3"></i> ${ex.limitation}</span>` : ''}
                            </div>
                            ${ex.isHighlight ? `<div class="absolute top-3 right-3 w-8 h-8 bg-fit-blue rounded-full flex items-center justify-center text-white shadow-lg border-2 border-white"><i data-lucide="star" class="w-4 h-4 fill-current"></i></div>` : ''}
                        </div>

                        <!-- Content Area -->
                        <div class="p-4 flex-1 flex flex-col">
                            <div class="flex justify-between items-start gap-2 mb-2">
                                <h3 class="font-head font-bold text-lg leading-tight text-fit-black cursor-pointer hover:text-fit-blue transition-colors" onclick="window.open('${ex.url}', '_blank')">${ex.name}</h3>
                                <button onclick="toggleHighlight('${ex.id}')" class="p-1.5 rounded-lg transition-colors ${ex.isHighlight ? 'text-fit-blue bg-blue-50' : 'text-zinc-300 hover:text-zinc-500 hover:bg-zinc-100'}">
                                    <i data-lucide="star" class="w-5 h-5 ${ex.isHighlight ? 'fill-current' : ''}"></i>
                                </button>
                            </div>
                            
                            <div class="flex flex-wrap gap-2 mb-3 mt-auto">
                                <span class="px-2 py-1 bg-blue-50 text-fit-blue text-[11px] font-bold rounded-md flex items-center gap-1 border border-blue-100">
                                    <i data-lucide="dumbbell" class="w-3 h-3"></i> ${ex.equip}
                                </span>
                                <span class="px-2 py-1 ${levelColors[ex.level]} text-[11px] font-bold rounded-md border border-emerald-100">
                                    ${ex.level}
                                </span>
                            </div>

                            ${ex.notes ? `<div class="mb-3 p-3 bg-orange-50 rounded-lg text-xs text-orange-800 italic border border-orange-100 leading-relaxed">${ex.notes}</div>` : ''}

                            <div class="flex justify-between items-center pt-3 border-t border-zinc-100">
                                <button onclick="editExercise('${ex.id}')" class="text-xs font-bold text-zinc-400 hover:text-fit-blue uppercase tracking-wider transition-colors flex items-center gap-1">
                                    <i data-lucide="edit-2" class="w-3 h-3"></i> Editar
                                </button>
                                <button onclick="deleteExercise('${ex.id}')" class="text-xs font-bold text-zinc-400 hover:text-fit-orange uppercase tracking-wider transition-colors flex items-center gap-1">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Excluir
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        // --- AÇÕES CRUD ---
        function saveExercise(e) {
            e.preventDefault();
            
            const id = document.getElementById('exId').value;
            const newEx = {
                id: id || generateId(),
                name: document.getElementById('exName').value.trim(),
                url: document.getElementById('exUrl').value.trim(),
                thumbBase64: document.getElementById('exThumbBase64').value,
                muscle: document.getElementById('exMuscle').value,
                equip: document.getElementById('exEquip').value,
                limitation: document.getElementById('exLimitation').value,
                level: document.querySelector('input[name="exLevel"]:checked').value,
                notes: document.getElementById('exNotes').value.trim(),
                isHighlight: id ? exercises.find(x => x.id === id).isHighlight : false
            };

            if (id) {
                const index = exercises.findIndex(x => x.id === id);
                exercises[index] = newEx;
            } else {
                exercises.push(newEx);
            }

            saveLocalData();
            closeAddModal();
            Swal.fire({icon: 'success', title: 'Salvo!', text: 'Exercício salvo com sucesso.', timer: 1500, showConfirmButton: false});
        }

        function editExercise(id) {
            const ex = exercises.find(x => x.id === id);
            if(!ex) return;

            document.getElementById('exId').value = ex.id;
            document.getElementById('exName').value = ex.name;
            document.getElementById('exUrl').value = ex.url;
            
            if(ex.thumbBase64) {
                document.getElementById('exThumbBase64').value = ex.thumbBase64;
                document.getElementById('thumbPreview').src = ex.thumbBase64;
                document.getElementById('thumbPreview').classList.remove('hidden');
                document.getElementById('thumbPlaceholder').classList.add('hidden');
            } else {
                document.getElementById('exThumbBase64').value = '';
                document.getElementById('thumbPreview').src = '';
                document.getElementById('thumbPreview').classList.add('hidden');
                document.getElementById('thumbPlaceholder').classList.remove('hidden');
            }

            document.getElementById('exMuscle').value = ex.muscle;
            document.getElementById('exEquip').value = ex.equip;
            document.getElementById('exLimitation').value = ex.limitation || '';
            document.getElementById('exNotes').value = ex.notes || '';
            document.querySelector(`input[name="exLevel"][value="${ex.level}"]`).checked = true;

            document.getElementById('modalTitle').innerText = 'Editar Exercício';
            openAddModal();
        }

        function deleteExercise(id) {
            Swal.fire({
                title: 'Tem certeza?',
                text: "Você não poderá reverter isso!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#71717a',
                confirmButtonText: 'Sim, excluir!',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    exercises = exercises.filter(x => x.id !== id);
                    saveLocalData();
                }
            });
        }

        function toggleHighlight(id) {
            const ex = exercises.find(x => x.id === id);
            if(ex) {
                ex.isHighlight = !ex.isHighlight;
                saveLocalData();
            }
        }

        function toggleStarFilter() {
            isStarFilterActive = !isStarFilterActive;
            const btn = document.getElementById('btnFilterStar');
            if(isStarFilterActive) {
                btn.classList.add('bg-blue-50', 'border-blue-200', 'text-fit-blue');
                btn.classList.remove('bg-zinc-50', 'border-zinc-200', 'text-zinc-400');
            } else {
                btn.classList.remove('bg-blue-50', 'border-blue-200', 'text-fit-blue');
                btn.classList.add('bg-zinc-50', 'border-zinc-200', 'text-zinc-400');
            }
            renderGallery();
        }

        // --- MODAIS ---
        function openAddModal() {
            const modal = document.getElementById('addModal');
            const panel = document.getElementById('addModalPanel');
            modal.classList.remove('hidden');
            setTimeout(() => panel.classList.remove('translate-x-full'), 10);
        }

        function closeAddModal() {
            const panel = document.getElementById('addModalPanel');
            panel.classList.add('translate-x-full');
            setTimeout(() => {
                document.getElementById('addModal').classList.add('hidden');
                document.getElementById('exerciseForm').reset();
                document.getElementById('exId').value = '';
                document.getElementById('exThumbBase64').value = '';
                document.getElementById('thumbPreview').src = '';
                document.getElementById('thumbPreview').classList.add('hidden');
                document.getElementById('thumbPlaceholder').classList.remove('hidden');
                document.getElementById('modalTitle').innerText = 'Novo Exercício';
            }, 300);
        }

        function openCategoryModal() {
            document.getElementById('categoryModal').classList.remove('hidden');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.add('hidden');
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function forceSync() {
            closeSettingsModal();
            syncFromGist(false);
        }

        function backupJSON() {
            const data = JSON.stringify({ exercises, categories }, null, 2);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' }));
            a.download = 'studio_backup.json';
            a.click();
        }

        function restoreJSON(input) {
            const r = new FileReader();
            r.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.exercises) exercises = data.exercises;
                    if(data.categories) categories = data.categories;
                    saveLocalData();
                    syncToGist();
                    renderGallery();
                    renderCategoryOptions();
                    Swal.fire({icon:'success', title:'Restaurado!', timer:1500, showConfirmButton:false});
                } catch { Swal.fire('Erro', 'Arquivo inválido.', 'error'); }
            };
            r.readAsText(input.files[0]);
        }
    </script>

    <!-- ★ BENAI CLOUD FAB ★ -->
    <button onclick="openSettingsModal()" class="benai-fab" title="Nuvem &amp; Backup">
        <div id="fabStatusDot" class="benai-fab-dot"></div>
        <i class="fa-solid fa-cloud"></i>
    </button>
